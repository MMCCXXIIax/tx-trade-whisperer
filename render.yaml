services:
  - type: web
    name: tx-trade-whisperer-frontend
    env: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VITE_API_BASE
        value: https://tx-predictive-intelligence.onrender.com
      - key: VITE_SUPABASE_PROJECT_ID
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
    # Explicitly specify npm as the package manager
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - server.js
        - src/**/*
        - public/**/*
        - index.html
        - vite.config.ts
        - tsconfig*.json